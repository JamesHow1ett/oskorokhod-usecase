pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{js,ts}"
      run: npx eslint {staged_files}
    - name: format
      glob: "*.{js,ts,json,md,yaml,yml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: lint
      run: npm run lint
    - name: format
      run: npm run format:check
    - name: test
      run: npm test
